<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="YesWeigh Service — coming soon. Weighing solutions for modern businesses."
    />
    <title>YesWeigh Service — Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <div class="glow glow--left"></div>
      <div class="glow glow--right"></div>

      <header class="header">
        <div class="logo">
          <span class="logo__mark">YW</span>
          <span class="logo__text">YesWeigh</span>
        </div>
      </header>

      <section class="hero">
        <p class="eyebrow">service.yesweigh.in</p>
        <h1>Something great is on the scale.</h1>
        <p class="lead">
          We are building a dedicated service platform for YesWeigh. Check back
          soon for updates.
        </p>
        <div class="status">
          <span class="status__dot" aria-hidden="true"></span>
          <span>Coming soon</span>
        </div>
      </section>

      <footer class="footer">
        <p>&copy; <span id="year"></span> YesWeigh. All rights reserved.</p>
      </footer>
    </main>

    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
