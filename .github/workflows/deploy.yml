name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need the push "before" SHA for selective functions deploy (changed-functions.mjs).
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # 22.23.0 breaks firebase-tools OAuth (Premature close); 22.23.1+ fixes nodejs/node#63989.
          node-version: '22.23.1'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install functions dependencies
        run: npm ci --prefix functions

      - name: Build
        run: npm run build

      - name: Configure Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_SERVICE_ACCOUNT_B64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: node scripts/ci-write-firebase-credentials.mjs

      - name: Prepare functions environment
        env:
          ZOHO_ORGANIZATION_ID: ${{ secrets.ZOHO_ORGANIZATION_ID }}
          ZOHO_WEBHOOK_SECRET: ${{ secrets.ZOHO_WEBHOOK_SECRET }}
        run: |
          if [ -z "$ZOHO_ORGANIZATION_ID" ]; then
            echo "::error::Add GitHub Actions secret ZOHO_ORGANIZATION_ID (Zoho Inventory → Settings → Organization Profile → Organization ID)."
            exit 1
          fi

          {
            printf 'ZOHO_ORGANIZATION_ID=%s\n' "$ZOHO_ORGANIZATION_ID"
            printf 'ZOHO_WEBHOOK_SECRET=%s\n' "${ZOHO_WEBHOOK_SECRET:-}"
          } > functions/.env.yesweigh-service

      - name: Deploy hosting, Firestore, and Storage
        run: bash scripts/ci-firebase-deploy.sh hosting,firestore,storage

      - name: Determine changed functions
        id: changed_functions
        run: |
          BASE="${{ github.event.before }}"
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE="HEAD~1"
          fi
          if ! git rev-parse --verify "${BASE}^{commit}" >/dev/null 2>&1; then
            echo "Base commit ${BASE} not in clone — fetching from origin"
            git fetch --depth=1 origin "${BASE}" || true
          fi
          echo "Comparing functions/ against ${BASE}"
          mapfile -t lines < <(node functions/scripts/changed-functions.mjs --base "$BASE")
          for line in "${lines[@]}"; do
            echo "$line"
            key="${line%%=*}"
            val="${line#*=}"
            echo "${key}=${val}" >> "$GITHUB_OUTPUT"
          done

      - name: Deploy Functions
        if: steps.changed_functions.outputs.skip != 'true'
        run: |
          if [ "${{ steps.changed_functions.outputs.deploy_all }}" = "true" ]; then
            DEPLOY_TARGET="functions"
            echo "Deploying all functions (shared functions/ change)."
          else
            DEPLOY_TARGET="${{ steps.changed_functions.outputs.deploy_only }}"
            echo "Deploying ${DEPLOY_TARGET} (${{ steps.changed_functions.outputs.count }} function(s))."
          fi
          set +e
          bash scripts/ci-firebase-deploy.sh "$DEPLOY_TARGET"
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            echo "::warning::Functions deploy had errors."
            echo "::warning::If the log mentions a missing environment variable, add it to functions/.env.yesweigh-service via the Prepare functions environment step (e.g. ZOHO_WEBHOOK_SECRET)."
            echo "::warning::If deploy aborted because a function exists in the project but not in source, CI should pass --force (scripts/ci-firebase-deploy.sh). Or delete manually:"
            echo "::warning::  firebase functions:delete <name> --region asia-south1 --project yesweigh-service"
            echo "::warning::If syncZohoCatalogScheduled failed with cloudscheduler.jobs.update, grant the CI service account:"
            echo "::warning::  Role: Cloud Scheduler Admin (roles/cloudscheduler.admin)"
            echo "::warning::  IAM: https://console.cloud.google.com/iam-admin/iam?project=yesweigh-service"
            echo "FUNCTIONS_DEPLOY_FAILED=true" >> "$GITHUB_ENV"
          fi

      - name: Functions deploy skipped
        if: steps.changed_functions.outputs.skip == 'true'
        run: echo "No functions/ changes — skipping functions deploy (${{ steps.changed_functions.outputs.reason }})."

      - name: Verify Functions deploy
        if: env.FUNCTIONS_DEPLOY_FAILED == 'true'
        run: |
          echo "::error::Functions deploy failed earlier in this workflow."
          echo "::error::Hosting, Firestore, and Storage may still have deployed successfully."
          echo "::error::Common fixes: ensure functions/.env.yesweigh-service includes ZOHO_WEBHOOK_SECRET (empty is OK); grant Cloud Scheduler Admin to FIREBASE_SERVICE_ACCOUNT if scheduler jobs fail."
          exit 1
