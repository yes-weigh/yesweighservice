name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install functions dependencies
        run: npm ci --prefix functions

      - name: Build
        run: npm run build

      - name: Configure Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ] && [ -z "$FIREBASE_TOKEN" ]; then
            echo "::error::No Firebase credentials found. Add one GitHub Actions secret:"
            echo "::error::  FIREBASE_SERVICE_ACCOUNT — full JSON from Firebase Console → Project settings → Service accounts → Generate new private key"
            echo "::error::  or FIREBASE_TOKEN — output of: firebase login:ci"
            exit 1
          fi

          if [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "$FIREBASE_SERVICE_ACCOUNT" > "${RUNNER_TEMP}/firebase-sa.json"
            echo "GOOGLE_APPLICATION_CREDENTIALS=${RUNNER_TEMP}/firebase-sa.json" >> "$GITHUB_ENV"
          else
            echo "FIREBASE_TOKEN=$FIREBASE_TOKEN" >> "$GITHUB_ENV"
          fi

      - name: Prepare functions environment
        env:
          ZOHO_ORGANIZATION_ID: ${{ secrets.ZOHO_ORGANIZATION_ID }}
        run: |
          if [ -z "$ZOHO_ORGANIZATION_ID" ]; then
            echo "::error::Add GitHub Actions secret ZOHO_ORGANIZATION_ID (Zoho Inventory → Settings → Organization Profile → Organization ID)."
            exit 1
          fi

          printf 'ZOHO_ORGANIZATION_ID=%s\n' "$ZOHO_ORGANIZATION_ID" > functions/.env.yesweigh-service

      - name: Deploy hosting and Firestore
        run: |
          set -e
          if [ -n "$GOOGLE_APPLICATION_CREDENTIALS" ]; then
            npx firebase-tools deploy \
              --only hosting,firestore \
              --project yesweigh-service \
              --non-interactive
          else
            npx firebase-tools deploy \
              --only hosting,firestore \
              --project yesweigh-service \
              --non-interactive \
              --token "$FIREBASE_TOKEN"
          fi

      - name: Deploy Functions
        run: |
          set +e
          if [ -n "$GOOGLE_APPLICATION_CREDENTIALS" ]; then
            npx firebase-tools deploy \
              --only functions \
              --project yesweigh-service \
              --non-interactive \
              --force
          else
            npx firebase-tools deploy \
              --only functions \
              --project yesweigh-service \
              --non-interactive \
              --force \
              --token "$FIREBASE_TOKEN"
          fi
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "::warning::Functions deploy had errors."
            echo "::warning::If syncZohoCatalogScheduled failed with cloudscheduler.jobs.update, grant the CI service account:"
            echo "::warning::  Role: Cloud Scheduler Admin (roles/cloudscheduler.admin)"
            echo "::warning::  IAM: https://console.cloud.google.com/iam-admin/iam?project=yesweigh-service"
            echo "FUNCTIONS_DEPLOY_FAILED=true" >> "$GITHUB_ENV"
          fi

      - name: Deploy Storage rules
        run: |
          set +e
          if [ -n "$GOOGLE_APPLICATION_CREDENTIALS" ]; then
            npx firebase-tools deploy \
              --only storage \
              --project yesweigh-service \
              --non-interactive
          else
            npx firebase-tools deploy \
              --only storage \
              --project yesweigh-service \
              --non-interactive \
              --token "$FIREBASE_TOKEN"
          fi
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "::error::Storage deploy failed."
            echo "::error::A Google Cloud project owner must enable Firebase Storage API once (CI cannot enable APIs):"
            echo "::error::https://console.cloud.google.com/apis/library/firebasestorage.googleapis.com?project=yesweigh-service"
            echo "::error::Then re-run this workflow. Catalog product images require Storage."
            exit "$status"
          fi

      - name: Post-deploy catalog sync
        if: env.GOOGLE_APPLICATION_CREDENTIALS != ''
        env:
          ZOHO_ORGANIZATION_ID: ${{ secrets.ZOHO_ORGANIZATION_ID }}
        run: node functions/scripts/ci-sync-catalog.mjs

      - name: Post-deploy invoice sync
        if: env.GOOGLE_APPLICATION_CREDENTIALS != ''
        env:
          ZOHO_ORGANIZATION_ID: ${{ secrets.ZOHO_ORGANIZATION_ID }}
        run: node functions/scripts/ci-sync-invoices.mjs

      - name: Verify Functions deploy
        if: env.FUNCTIONS_DEPLOY_FAILED == 'true'
        run: |
          echo "::error::Functions deploy failed earlier in this workflow."
          echo "::error::Hosting, Firestore, and Storage may still have deployed successfully."
          echo "::error::Grant Cloud Scheduler Admin to the FIREBASE_SERVICE_ACCOUNT principal, then re-run."
          exit 1
