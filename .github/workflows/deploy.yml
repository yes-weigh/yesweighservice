name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install functions dependencies
        run: npm ci --prefix functions

      - name: Build
        run: npm run build

      - name: Deploy to Firebase
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ] && [ -z "$FIREBASE_TOKEN" ]; then
            echo "::error::No Firebase credentials found. Add one GitHub Actions secret:"
            echo "::error::  FIREBASE_SERVICE_ACCOUNT — full JSON from Firebase Console → Project settings → Service accounts → Generate new private key"
            echo "::error::  or FIREBASE_TOKEN — output of: firebase login:ci"
            exit 1
          fi

          if [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "$FIREBASE_SERVICE_ACCOUNT" > "${RUNNER_TEMP}/firebase-sa.json"
            export GOOGLE_APPLICATION_CREDENTIALS="${RUNNER_TEMP}/firebase-sa.json"
            npx firebase-tools deploy --only hosting,firestore:rules,functions --project yesweigh-service --non-interactive
          else
            npx firebase-tools deploy --only hosting,firestore:rules,functions --project yesweigh-service --non-interactive --token "$FIREBASE_TOKEN"
          fi
