name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install functions dependencies
        run: npm ci --prefix functions

      - name: Build
        run: npm run build

      - name: Configure Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ] && [ -z "$FIREBASE_TOKEN" ]; then
            echo "::error::No Firebase credentials found. Add one GitHub Actions secret:"
            echo "::error::  FIREBASE_SERVICE_ACCOUNT — full JSON from Firebase Console → Project settings → Service accounts → Generate new private key"
            echo "::error::  or FIREBASE_TOKEN — output of: firebase login:ci"
            exit 1
          fi

          if [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "$FIREBASE_SERVICE_ACCOUNT" > "${RUNNER_TEMP}/firebase-sa.json"
            echo "GOOGLE_APPLICATION_CREDENTIALS=${RUNNER_TEMP}/firebase-sa.json" >> "$GITHUB_ENV"
          else
            echo "FIREBASE_TOKEN=$FIREBASE_TOKEN" >> "$GITHUB_ENV"
          fi

      - name: Deploy hosting and Firestore
        run: |
          if [ -n "$GOOGLE_APPLICATION_CREDENTIALS" ]; then
            npx firebase-tools deploy --only hosting,firestore:rules --project yesweigh-service --non-interactive
          else
            npx firebase-tools deploy --only hosting,firestore:rules --project yesweigh-service --non-interactive --token "$FIREBASE_TOKEN"
          fi

      - name: Deploy Cloud Functions
        run: |
          set +e
          if [ -n "$GOOGLE_APPLICATION_CREDENTIALS" ]; then
            npx firebase-tools deploy --only functions --project yesweigh-service --non-interactive
          else
            npx firebase-tools deploy --only functions --project yesweigh-service --non-interactive --token "$FIREBASE_TOKEN"
          fi
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "::error::Cloud Functions deploy failed. A project owner must enable Artifact Registry, Cloud Build, and Cloud Functions APIs:"
            echo "::error::https://console.cloud.google.com/apis/library?project=yesweigh-service"
            echo "::error::See README.md → GitHub Actions (CI) for required service-account roles."
            exit "$status"
          fi
